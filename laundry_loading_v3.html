
<style>
  @keyframes spin-cw {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes bubble-float {
    0%   { opacity: 0.8; transform: translateY(0) scale(1); }
    100% { opacity: 0;   transform: translateY(-60px) scale(0.3); }
  }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-5px); }
  }
  @keyframes progress-fill {
    0%   { width: 0%; }
    80%  { width: 88%; }
    100% { width: 88%; }
  }
  .swirl {
    transform-origin: 130px 140px;
    animation: spin-cw 2.2s linear infinite;
  }
  .bubble { animation: bubble-float 2s ease-in infinite; }
  .dot    { display: inline-block; }
  .dot:nth-child(1) { animation: dot-bounce 1.2s ease-in-out 0.0s infinite; }
  .dot:nth-child(2) { animation: dot-bounce 1.2s ease-in-out 0.2s infinite; }
  .dot:nth-child(3) { animation: dot-bounce 1.2s ease-in-out 0.4s infinite; }
  .pfill { animation: progress-fill 3s ease-in-out infinite; }
</style>

<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1rem;min-height:400px;">

  <circle class="bubble" cx="230" cy="108" r="5.5" fill="#2e9fd8" opacity="0.7" style="animation-delay:0.2s;animation-duration:2.0s"/>

  <circle class="bubble" cx="222" cy="78"  r="4.5" fill="#c8e8fa" opacity="0.7" style="animation-delay:1.2s;animation-duration:2.2s"/>

</svg>

  <p style="margin:4px 0 18px;font-size:14px;color:#1a6fb5;opacity:0.85;">
    Please wait while we spin things up

  <div style="width:220px;height:6px;background:#90c8f0;border-radius:99px;overflow:hidden;">
